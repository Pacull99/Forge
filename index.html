<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Platform / Dashboard</title>
    <style>
        /* CSS yang disediakan dari kode Anda */
        @layer properties {
            @supports (((-webkit-hyphens:none)) and (not (margin-trim:inline))) or ((-moz-orient:inline) and (not (color:rgb(from red r g b)))){
                *,:before,:after,::backdrop{--tw-rotate-x:initial;--tw-rotate-y:initial;--tw-rotate-z:initial;--tw-skew-x:initial;--tw-skew-y:initial;--tw-font-weight:initial;--tw-blur:initial;--tw-brightness:initial;--tw-contrast:initial;--tw-grayscale:initial;--tw-hue-rotate:initial;--tw-invert:initial;--tw-opacity:initial;--tw-saturate:initial;--tw-sepia:initial;--tw-drop-shadow:initial;--tw-drop-shadow-color:initial;--tw-drop-shadow-alpha:100%;--tw-drop-shadow-size:initial}
            }
        }
        @layer theme {
            :root,:host{--font-sans:ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";--font-mono:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;--color-blue-600:oklch(54.6% .245 262.881);--color-gray-600:oklch(44.6% .03 256.802);--spacing:.25rem;--font-weight-bold:700;--default-font-family:var(--font-sans);--default-mono-font-family:var(--font-mono)}
        }
        @layer base {
            *,:after,:before,::backdrop{box-sizing:border-box;border:0 solid;margin:0;padding:0}
            ::file-selector-button{box-sizing:border-box;border:0 solid;margin:0;padding:0}
            html,:host{-webkit-text-size-adjust:100%;tab-size:4;line-height:1.5;font-family:var(--default-font-family,ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji");font-feature-settings:var(--default-font-feature-settings,normal);font-variation-settings:var(--default-font-variation-settings,normal);-webkit-tap-highlight-color:transparent}
            hr{height:0;color:inherit;border-top-width:1px}
            abbr:where([title]){-webkit-text-decoration:underline dotted;text-decoration:underline dotted}
            h1,h2,h3,h4,h5,h6{font-size:inherit;font-weight:inherit}
            a{color:inherit;-webkit-text-decoration:inherit;text-decoration:inherit}
            b,strong{font-weight:bolder}
            code,kbd,samp,pre{font-family:var(--default-mono-font-family,ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace);font-feature-settings:var(--default-mono-font-feature-settings,normal);font-variation-settings:var(--default-mono-font-variation-settings,normal);font-size:1em}
            small{font-size:80%}
            sub,sup{vertical-align:baseline;font-size:75%;line-height:0;position:relative}
            sub{bottom:-.25em}sup{top:-.5em}
            table{text-indent:0;border-color:inherit;border-collapse:collapse}
            :-moz-focusring{outline:auto}
            progress{vertical-align:baseline}
            summary{display:list-item}
            ol,ul,menu{list-style:none}
            img,svg,video,canvas,audio,iframe,embed,object{vertical-align:middle;display:block}
            img,video{max-width:100%;height:auto}
            button,input,select,optgroup,textarea{font:inherit;font-feature-settings:inherit;font-variation-settings:inherit;letter-spacing:inherit;color:inherit;opacity:1;background-color:#0000;border-radius:0}
            ::file-selector-button{font:inherit;font-feature-settings:inherit;font-variation-settings:inherit;letter-spacing:inherit;color:inherit;opacity:1;background-color:#0000;border-radius:0}
            :where(select:is([multiple],[size])) optgroup{font-weight:bolder}
            :where(select:is([multiple],[size])) optgroup option{padding-inline-start:20px}
            ::file-selector-button{margin-inline-end:4px}
            ::placeholder{opacity:1}
            @supports (not ((-webkit-appearance:-apple-pay-button))) or (contain-intrinsic-size:1px){
                ::placeholder{color:currentColor}
                @supports (color:color-mix(in lab,red,red)){
                    ::placeholder{color:color-mix(in oklab,currentcolor 50%,transparent)}
                }
            }
            textarea{resize:vertical}
            ::-webkit-search-decoration{-webkit-appearance:none}
            ::-webkit-date-and-time-value{min-height:1lh;text-align:inherit}
            ::-webkit-datetime-edit{display:inline-flex}
            ::-webkit-datetime-edit-fields-wrapper{padding:0}
            ::-webkit-datetime-edit{padding-block:0}
            ::-webkit-datetime-edit-year-field{padding-block:0}
            ::-webkit-datetime-edit-month-field{padding-block:0}
            ::-webkit-datetime-edit-day-field{padding-block:0}
            ::-webkit-datetime-edit-hour-field{padding-block:0}
            ::-webkit-datetime-edit-minute-field{padding-block:0}
            ::-webkit-datetime-edit-second-field{padding-block:0}
            ::-webkit-datetime-edit-millisecond-field{padding-block:0}
            ::-webkit-datetime-edit-meridiem-field{padding-block:0}
            ::-webkit-calendar-picker-indicator{line-height:1}
            :-moz-ui-invalid{box-shadow:none}
            button,input:where([type=button],[type=reset],[type=submit]){appearance:button}
            ::file-selector-button{appearance:button}
            ::-webkit-inner-spin-button{height:auto}
            ::-webkit-outer-spin-button{height:auto}
            [hidden]:where(:not([hidden=until-found])){display:none!important}
        }
        @layer components;
        @layer utilities {
            .static{position:static}
            .start{inset-inline-start:var(--spacing)}
            .hidden{display:none}
            .transform{transform:var(--tw-rotate-x,) var(--tw-rotate-y,) var(--tw-rotate-z,) var(--tw-skew-x,) var(--tw-skew-y,)}
            .font-bold{--tw-font-weight:var(--font-weight-bold);font-weight:var(--font-weight-bold)}
            .text-blue-600{color:var(--color-blue-600)}
            .text-gray-600{color:var(--color-gray-600)}
            .filter{filter:var(--tw-blur,) var(--tw-brightness,) var(--tw-contrast,) var(--tw-grayscale,) var(--tw-hue-rotate,) var(--tw-invert,) var(--tw-saturate,) var(--tw-sepia,) var(--tw-drop-shadow,)}
        }
        :root{--ink:#0b0d0c;--ink-soft:#111412;--panel:#151816;--panel-light:#1b1f1c;--line:#30352f;--line-soft:#232723;--paper:#f0f2eb;--muted:#929a91;--acid:#b8ef3f;--acid-dark:#8fbd27;--mono:"IBM Plex Mono", "Cascadia Mono", "SFMono-Regular", Consolas, monospace;--display:Impact, Haettenschweiler, "Franklin Gothic Condensed", sans-serif;--body:"Trebuchet MS", "Gill Sans", sans-serif}
        *{box-sizing:border-box}
        html{scroll-behavior:smooth;background:var(--ink)}
        body{color:var(--paper);background:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;margin:0}
        button,a{-webkit-tap-highlight-color:transparent}
        button{font:inherit}
        a{color:inherit;text-decoration:none}
        ::selection{color:var(--ink);background:var(--acid)}
        .site-shell{background:linear-gradient(#b8ef3f05 1px,transparent 1px),linear-gradient(90deg,#b8ef3f05 1px,transparent 1px),var(--ink);background-size:56px 56px;min-height:100vh;overflow:hidden}
        .noise{z-index:20;pointer-events:none;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.7'/%3E%3C/svg%3E");position:fixed;inset:0}
        .topbar{z-index:15;-webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);background:#0b0d0cd6;border-bottom:1px solid #f0f2eb1f;grid-template-columns:1fr auto 1fr;align-items:center;height:78px;padding:0 3.4vw;display:grid;position:fixed;inset:0 0 auto}
        .brand{width:max-content;font-family:var(--display);letter-spacing:.05em;align-items:center;gap:9px;font-weight:900;display:inline-flex}
        .brand-word{font-size:1.1rem}
        .brand-slash{color:var(--acid);font-family:var(--mono)}
        .brand-virtuals{color:var(--muted);font-family:var(--mono);letter-spacing:.17em;font-size:.62rem}
        .forge-mark{width:27px;height:28px;display:inline-block;position:relative}
        .forge-mark span{background:var(--acid);height:7px;position:absolute;left:0;transform:skew(-22deg)}
        .forge-mark span:first-child{width:27px;top:0}
        .forge-mark span:nth-child(2){width:20px;top:10px}
        .forge-mark span:nth-child(3){width:12px;top:20px}
        .nav-panel{align-items:center;gap:clamp(24px,3vw,48px);display:flex}
        .nav-panel a{color:#c7cbc4;font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase;font-size:.68rem;position:relative}
        .nav-panel a:after{content:"";background:var(--acid);transform-origin:100%;width:100%;height:1px;transition:transform .18s;position:absolute;top:calc(100% + 8px);left:0;transform:scaleX(0)}
        .nav-panel a:hover:after,.nav-panel a:focus-visible:after{transform-origin:0;transform:scaleX(1)}
        .nav-actions{justify-content:flex-end;align-items:center;gap:18px;display:flex}
        .status-pill,.live-indicator{color:var(--muted);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;align-items:center;gap:7px;font-size:.62rem;display:flex}
        .status-pill span,.live-indicator span{background:var(--acid);border-radius:50%;width:7px;height:7px;animation:2s ease-out infinite status-pulse;box-shadow:0 0 0 5px #b8ef3f17}
        .wallet-button,.button{border:1px solid var(--acid);min-height:48px;color:var(--ink);background:var(--acid);font-family:var(--mono);letter-spacing:.09em;text-transform:uppercase;cursor:pointer;border-radius:0;justify-content:center;align-items:center;gap:12px;padding:0 21px;font-size:.7rem;font-weight:800;transition:transform .18s,background .18s,color .18s;display:inline-flex}
        .wallet-button:hover,.button-primary:hover{background:var(--paper);border-color:var(--paper);transform:translateY(-2px)}
        .menu-button,.mobile-close{color:var(--paper);cursor:pointer;background:0 0;border:0;display:none}
        .hero{border-bottom:1px solid var(--line);grid-template-columns:1.04fr .96fr;align-items:stretch;min-height:min(920px,100vh);padding:78px 3.4vw 0;display:grid;position:relative}
        .hero:before{content:"";background:var(--line-soft);width:1px;position:absolute;inset:78px 50% 0 auto}
        .hero-copy{align-self:center;max-width:760px;padding:9vh 6vw 8vh 1vw}
        .eyebrow,.section-kicker{font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase;font-size:.66rem}
        .eyebrow{color:var(--muted);border-bottom:1px solid var(--line);justify-content:space-between;padding-bottom:15px;display:flex}
        .eyebrow span:first-child,.section-kicker{color:var(--acid)}
        .hero h1,.section-heading h2,.ecosystem-header h2,.developer-copy h2,.final-cta h2{font-family:var(--display);letter-spacing:-.065em;text-transform:uppercase;margin:0;font-weight:900;font-stretch:75%;line-height:.85}
        .hero h1{margin-top:7vh;font-size:clamp(4.6rem,8.2vw,9.2rem)}
        .hero h1 span{color:#0000;-webkit-text-stroke:1.5px var(--acid);display:block}
        .hero-intro{color:#afb5ad;max-width:620px;margin:38px 0 0;font-size:clamp(1rem,1.35vw,1.22rem);line-height:1.65}
        .hero-actions{gap:10px;margin-top:38px;display:flex}
        .button-ghost{color:var(--paper);border-color:var(--line);background:0 0}
        .button-ghost:hover{color:var(--acid);border-color:var(--acid);transform:translateY(-2px)}
        .hero-footnote{color:var(--muted);font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;gap:26px;margin-top:30px;font-size:.62rem;display:flex}
        .hero-footnote span{align-items:center;gap:7px;display:flex}
        .hero-footnote svg{color:var(--acid)}
        .agent-visual{aspect-ratio:1;border:1px solid var(--line);background:radial-gradient(circle at center,#b8ef3f14,transparent 38%),linear-gradient(#b8ef3f0a 1px,transparent 1px),linear-gradient(90deg,#b8ef3f0a 1px,transparent 1px),var(--ink-soft);background-size:auto,28px 28px,28px 28px,auto;place-self:center;width:min(43vw,650px);position:relative;overflow:hidden}
        .agent-visual:before,.agent-visual:after{content:"";background:#b8ef3f38;position:absolute}
        .agent-visual:before{width:100%;height:1px;top:50%;left:0}
        .agent-visual:after{width:1px;height:100%;top:0;left:50%}
        .visual-label,.coordinate,.visual-readout{z-index:2;font-family:var(--mono);letter-spacing:.1em;position:absolute}
        .visual-label-top{color:var(--acid);font-size:.62rem;top:22px;left:24px}
        .coordinate{color:#626a61;font-size:.52rem}
        .coordinate-x{top:22px;right:18px}
        .coordinate-y{bottom:18px;left:20px}
        .orbit-ring{z-index:1;border:1px solid #b8ef3f42;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
        .orbit-one{width:30%;height:30%}
        .orbit-two{border-style:dashed;width:58%;height:58%;animation:28s linear infinite spin}
        .orbit-three{opacity:.55;width:83%;height:83%}
        .orbit-node{z-index:3;width:38px;height:38px;color:var(--acid);border:1px solid var(--acid-dark);background:var(--panel);place-items:center;display:grid;position:absolute}
        .node-one{animation:4s ease-in-out infinite float;top:29%;left:18%}
        .node-two{animation:4.6s ease-in-out -1s infinite float;top:47%;right:13%}
        .node-three{animation:5.2s ease-in-out -2s infinite float;bottom:10%;left:32%}
        .agent-core{z-index:4;width:148px;height:148px;color:var(--acid);border:1px solid var(--acid);background:#0f1210ed;flex-direction:column;justify-content:center;align-items:center;display:flex;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)rotate(45deg)}
        .agent-core>*{transform:rotate(-45deg)}
        .agent-core span{font-family:var(--mono);letter-spacing:.08em;margin-top:10px;font-size:.58rem}
        .agent-core small{color:var(--muted);font-family:var(--mono);letter-spacing:.18em;margin-top:4px;font-size:.45rem}
        .core-pulse{border:1px solid var(--acid);animation:2.8s ease-out infinite core-pulse;position:absolute;inset:-1px}
        .visual-readout{color:var(--muted);flex-direction:column;gap:3px;font-size:.5rem;display:flex;bottom:24px}
        .visual-readout strong{color:var(--paper);font-size:.72rem}
        .readout-left{left:24px}
        .readout-right{text-align:right;right:24px}
        .hero-index{z-index:3;color:var(--ink);font-family:var(--display);-webkit-text-stroke:1px var(--line);font-size:4rem;font-weight:900;line-height:1;position:absolute;bottom:-24px;right:2.3vw}
        .ticker{border-bottom:1px solid var(--line);background:var(--acid);color:var(--ink);overflow:hidden}
        .ticker-track{width:max-content;font-family:var(--mono);letter-spacing:.13em;align-items:center;gap:42px;padding:13px 0;font-size:.64rem;font-weight:800;animation:30s linear infinite ticker;display:flex}
        .section-wrap{max-width:1560px;margin:0 auto;padding:140px 5vw}
        .section-heading{grid-template-columns:1.2fr .8fr;align-items:end;gap:8vw;margin-bottom:80px;display:grid}
        .section-heading h2,.ecosystem-header h2,.developer-copy h2{margin-top:20px;font-size:clamp(3.6rem,6.8vw,7.4rem)}
        .section-heading p,.developer-copy>p{max-width:490px;color:var(--muted);margin:0;line-height:1.7}
        .capability-list{border-top:1px solid var(--line)}
        .capability-row{border-bottom:1px solid var(--line);grid-template-columns:58px 58px minmax(210px,.75fr) minmax(320px,1.3fr) 90px 24px;align-items:center;gap:24px;min-height:154px;padding:24px 14px;transition:color .18s,background .18s;display:grid;position:relative}
        .capability-row:before{content:"";z-index:-1;background:var(--acid);transform-origin:bottom;transition:transform .25s cubic-bezier(.2,.7,.2,1);position:absolute;inset:0;transform:scaleY(0)}
        .capability-row:hover{color:var(--ink)}
        .capability-row:hover:before{transform:scaleY(1)}
        .capability-row:hover p,.capability-row:hover .capability-number{color:#3f4938}
        .capability-row:hover .capability-icon{border-color:var(--ink)}
        .capability-number,.capability-tag{color:var(--muted);font-family:var(--mono);letter-spacing:.1em;font-size:.6rem}
        .capability-icon{width:48px;height:48px;color:var(--acid);border:1px solid var(--line);place-items:center;display:grid}
        .capability-row:hover .capability-icon{color:var(--ink)}
        .capability-row h3{font-family:var(--display);text-transform:uppercase;margin:0;font-size:clamp(1.6rem,2.3vw,2.5rem)}
        .capability-row p{color:var(--muted);margin:0;line-height:1.6}
        .capability-tag{color:var(--acid);justify-self:end}
        .row-arrow{justify-self:end}
        .ecosystem{border-top:1px solid var(--line);background:var(--ink-soft);max-width:none}
        .ecosystem-header{justify-content:space-between;align-items:end;max-width:1440px;margin:0 auto 70px;display:flex}
        .ecosystem-header h2{max-width:1050px}
        .live-indicator{margin-bottom:10px}
        .metrics-grid,.activity-console{max-width:1440px;margin-inline:auto}
        .metrics-grid{border-top:1px solid var(--line);border-left:1px solid var(--line);grid-template-columns:repeat(3,1fr);display:grid}
        .metric-card{border-right:1px solid var(--line);border-bottom:1px solid var(--line);min-height:300px;padding:34px;position:relative;overflow:hidden}
        .metric-delta{color:var(--acid);font-family:var(--mono);letter-spacing:.07em;font-size:.62rem}
        .metric-card strong{font-family:var(--display);letter-spacing:-.06em;margin-top:48px;font-size:clamp(3rem,5vw,5.8rem);line-height:1;display:block}
        .metric-card p{color:var(--muted);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;margin:10px 0 0;font-size:.65rem}
        .metric-bars{opacity:.45;align-items:end;gap:5px;height:36px;display:flex;position:absolute;bottom:30px;left:30px;right:30px}
        .metric-bars i{background:var(--acid);flex:1;display:block}
        .activity-console{border:1px solid var(--line);background:#0c0f0d;margin-top:28px}
        .console-topbar,.activity-row{font-family:var(--mono);letter-spacing:.07em;align-items:center;font-size:.62rem;display:grid}
        .console-topbar{color:var(--muted);border-bottom:1px solid var(--line);grid-template-columns:1fr auto;padding:15px 20px}
        .activity-row{border-bottom:1px solid var(--line-soft);grid-template-columns:90px 1fr 1.5fr 80px 100px 18px;gap:18px;padding:21px 20px}
        .activity-row:last-child{border-bottom:0}
        .activity-time{color:#555d55}
        .activity-agent{color:var(--paper);align-items:center;gap:9px;font-weight:800;display:flex}
        .activity-agent svg,.activity-row strong{color:var(--acid)}
        .chain-badge{border:1px solid var(--line);width:max-content;color:var(--muted);padding:4px 7px}
        .developer-section{background:var(--paper);color:var(--ink);grid-template-columns:.86fr 1.14fr;align-items:center;gap:8vw;padding:150px max(5vw,50vw - 720px);display:grid}
        .developer-copy>p{color:#60675f;margin-top:34px}
        .developer-links{gap:28px;margin-top:38px;display:flex}
        .developer-links a{border-bottom:1px solid var(--ink);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;align-items:center;gap:8px;padding-bottom:5px;font-size:.65rem;font-weight:800;display:flex}
        .code-window{color:#d9ded5;background:#101310;border:1px solid #323832;box-shadow:18px 18px #cbd0c4}
        .code-titlebar{color:#737b72;font-family:var(--mono);letter-spacing:.08em;border-bottom:1px solid #2
